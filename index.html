<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teste de Ansiedade por Disfunção Respiratória — iBreathwork</title>
    <meta name="description" content="Descubra o quanto sua respiração está contribuindo para a ansiedade que você sente no dia a dia. Teste gratuito baseado em neurociência — iBreathwork.">
    <meta name="theme-color" content="#FFFFFF">

    <!-- Open Graph -->
    <meta property="og:title" content="Teste de Ansiedade por Disfunção Respiratória — iBreathwork">
    <meta property="og:description" content="Descubra o quanto sua respiração está contribuindo para a ansiedade que você sente no dia a dia. Teste gratuito baseado em neurociência.">
    <meta property="og:type" content="website">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Particle Background -->
    <canvas id="particles-canvas"></canvas>
    <!-- Confetti Canvas -->
    <canvas id="confetti-canvas"></canvas>

    <div id="app">
        <!-- ==============================
             TELA 1: WELCOME
             ============================== -->
        <div id="welcome-screen" class="screen active">
            <div class="welcome-wrapper">
                <!-- Breathing Lung SVG -->
                <div class="lung-container">
                    <div class="lung-glow"></div>
                    <svg class="lung-svg" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <!-- Left lung -->
                        <path d="M38 35C38 35 28 42 24 55C20 68 22 82 30 88C36 92 42 90 44 84C46 78 48 65 48 55C48 45 44 38 38 35Z" fill="url(#lgL)" opacity="0.2" stroke="#2D5A3D" stroke-width="1.5" stroke-opacity="0.3"/>
                        <!-- Right lung -->
                        <path d="M82 35C82 35 92 42 96 55C100 68 98 82 90 88C84 92 78 90 76 84C74 78 72 65 72 55C72 45 76 38 82 35Z" fill="url(#lgR)" opacity="0.2" stroke="#2D5A3D" stroke-width="1.5" stroke-opacity="0.3"/>
                        <!-- Trachea -->
                        <path d="M60 18L60 40" stroke="#2D5A3D" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
                        <!-- Bronchi -->
                        <path d="M60 40C60 40 48 48 42 38" stroke="#2D5A3D" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
                        <path d="M60 40C60 40 72 48 78 38" stroke="#2D5A3D" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
                        <!-- Bronchioles left -->
                        <path d="M42 38C42 38 34 50 30 60" stroke="#4A7C59" stroke-width="1.2" stroke-linecap="round" opacity="0.3"/>
                        <path d="M42 38C42 38 38 52 36 65" stroke="#4A7C59" stroke-width="1.2" stroke-linecap="round" opacity="0.3"/>
                        <!-- Bronchioles right -->
                        <path d="M78 38C78 38 86 50 90 60" stroke="#4A7C59" stroke-width="1.2" stroke-linecap="round" opacity="0.3"/>
                        <path d="M78 38C78 38 82 52 84 65" stroke="#4A7C59" stroke-width="1.2" stroke-linecap="round" opacity="0.3"/>
                        <!-- Air flow dots -->
                        <circle cx="60" cy="24" r="2" fill="#6ba378" opacity="0.6">
                            <animate attributeName="cy" values="18;32;18" dur="4s" repeatCount="indefinite"/>
                            <animate attributeName="opacity" values="0.6;0.2;0.6" dur="4s" repeatCount="indefinite"/>
                        </circle>
                        <circle cx="56" cy="30" r="1.5" fill="#6ba378" opacity="0.4">
                            <animate attributeName="cy" values="30;50;30" dur="4s" begin="0.5s" repeatCount="indefinite"/>
                            <animate attributeName="cx" values="56;40;56" dur="4s" begin="0.5s" repeatCount="indefinite"/>
                            <animate attributeName="opacity" values="0.4;0.1;0.4" dur="4s" begin="0.5s" repeatCount="indefinite"/>
                        </circle>
                        <circle cx="64" cy="30" r="1.5" fill="#6ba378" opacity="0.4">
                            <animate attributeName="cy" values="30;50;30" dur="4s" begin="0.5s" repeatCount="indefinite"/>
                            <animate attributeName="cx" values="64;80;64" dur="4s" begin="0.5s" repeatCount="indefinite"/>
                            <animate attributeName="opacity" values="0.4;0.1;0.4" dur="4s" begin="0.5s" repeatCount="indefinite"/>
                        </circle>
                        <defs>
                            <linearGradient id="lgL" x1="24" y1="35" x2="48" y2="88">
                                <stop stop-color="#2D5A3D"/>
                                <stop offset="1" stop-color="#6ba378"/>
                            </linearGradient>
                            <linearGradient id="lgR" x1="96" y1="35" x2="72" y2="88">
                                <stop stop-color="#2D5A3D"/>
                                <stop offset="1" stop-color="#6ba378"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>

                <div class="welcome-logo">
                    <div class="logo-dot"></div>
                    <span class="logo-text">iBreathwork</span>
                </div>

                <h1 class="welcome-title">
                    Teste de Ansiedade por<br>
                    <span class="gradient-text">Disfunção Respiratória</span>
                </h1>

                <p class="welcome-subtitle">
                    Descubra o quanto sua respiração está contribuindo para a ansiedade que você sente no dia a dia.
                </p>

                <div class="welcome-badges">
                    <div class="badge"><span class="badge-icon">⏱</span> 5 min</div>
                    <div class="badge"><span class="badge-icon">✓</span> Gratuito</div>
                    <div class="badge"><span class="badge-icon">🔬</span> Científico</div>
                </div>

                <button id="start-btn" class="btn-primary btn-glow" onclick="startQuiz()">
                    Iniciar Avaliação Gratuita
                    <span class="btn-arrow">&rarr;</span>
                </button>

                <p class="welcome-trust">Gratuito e confidencial · Mais de 2.000 pessoas já fizeram</p>
            </div>
        </div>

        <!-- ==============================
             TELA 2: QUIZ
             ============================== -->
        <div id="quiz-screen" class="screen">
            <div class="quiz-top-bar">
                <div class="progress-track">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <div class="progress-info">
                    <span id="question-counter">1 de 11</span>
                    <span id="progress-text">0%</span>
                </div>
            </div>

            <div class="question-wrapper" id="question-container">
                <!-- Dynamic question content -->
            </div>
        </div>

        <!-- ==============================
             TELA 3: ANALYZING ANIMATION
             ============================== -->
        <div id="lead-screen" class="screen">
            <div class="lead-wrapper">
                <div class="analyzing-animation" id="analyzing-animation">
                    <div class="analyzing-brain">
                        <div class="brain-pulse"></div>
                        <div class="brain-pulse delay-1"></div>
                        <div class="brain-pulse delay-2"></div>
                        <span class="brain-emoji">🧠</span>
                    </div>
                    <h2 class="analyzing-title">Analisando suas respostas...</h2>
                    <div class="analyzing-steps" id="analyzing-steps"></div>
                </div>
            </div>
        </div>

        <!-- ==============================
             TELA 4: RESULTADO
             ============================== -->
        <div id="result-screen" class="screen">
            <div class="result-container" id="result-container">
                <!-- Dynamic results -->
            </div>
        </div>
    </div>

    <script src="quiz-data.js"></script>
    <script src="app.js"></script>
</body>
</html>
