name: Auto-merge Claude branches to main

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Claude branch to merge'
        required: true
        type: string

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Merge claude branch into main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin ${{ inputs.branch }}
          if git merge origin/${{ inputs.branch }} --no-edit; then
            git push origin main
            echo "Merged and pushed successfully."
          else
            echo "Merge conflict. Manual intervention required."
            exit 1
          fi
