name: Auto-merge Claude branches to main

on:
  push:
    branches:
      - 'claude/**'

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Merge claude branch into main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git merge origin/${{ github.ref_name }} --no-edit; then
            if [ -n "$(git diff HEAD origin/main)" ]; then
              git push origin main
              echo "Merged and pushed successfully."
            else
              echo "Already up to date. Nothing to push."
            fi
          else
            echo "Merge failed. Manual intervention required."
            exit 1
          fi
