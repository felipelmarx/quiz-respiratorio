<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teste de Ansiedade por Disfunção Respiratória — iBreathwork</title>
    <meta name="description" content="Descubra o quanto sua respiração está contribuindo para a ansiedade que você sente no dia a dia. Teste gratuito baseado em neurociência — iBreathwork.">
    <meta name="theme-color" content="#FFFFFF">

    <!-- Open Graph -->
    <meta property="og:title" content="Teste de Ansiedade por Disfunção Respiratória — iBreathwork">
    <meta property="og:description" content="Descubra o quanto sua respiração está contribuindo para a ansiedade que você sente no dia a dia. Teste gratuito baseado em neurociência.">
    <meta property="og:type" content="website">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Particle Background -->
    <canvas id="particles-canvas"></canvas>
    <!-- Confetti Canvas -->
    <canvas id="confetti-canvas"></canvas>

    <div id="app">
        <!-- ==============================
             TELA 1: WELCOME
             ============================== -->
        <div id="welcome-screen" class="screen active">
            <div class="welcome-wrapper">
                <div class="welcome-logo">
                    <svg class="logo-icon" width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M24 6C18 6 12 10 10 16C8 22 10 28 14 32C16 34 20 38 24 42C28 38 32 34 34 32C38 28 40 22 38 16C36 10 30 6 24 6Z" fill="url(#leafGrad)" opacity="0.15"/>
                        <path d="M17 20C17 16 19 13 22 12C20 15 19 18 20 22C21 26 24 28 24 28C24 28 21 26 19 23C18 21.5 17 20 17 20Z" fill="#2D5A3D" opacity="0.6"/>
                        <path d="M31 20C31 16 29 13 26 12C28 15 29 18 28 22C27 26 24 28 24 28C24 28 27 26 29 23C30 21.5 31 20 31 20Z" fill="#2D5A3D" opacity="0.6"/>
                        <path d="M24 14C24 14 22 18 22 24C22 28 24 32 24 32C24 32 26 28 26 24C26 18 24 14 24 14Z" fill="#4A7C59" opacity="0.5"/>
                        <defs>
                            <linearGradient id="leafGrad" x1="10" y1="6" x2="38" y2="42" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#2D5A3D"/>
                                <stop offset="1" stop-color="#6ba378"/>
                            </linearGradient>
                        </defs>
                    </svg>
                    <span class="logo-text">iBreathwork</span>
                </div>

                <h1 class="welcome-title">
                    Teste de Ansiedade<br>
                    <span class="welcome-por">por</span> <span class="gradient-text">Disfunção Respiratória</span>
                </h1>

                <p class="welcome-subtitle">
                    Descubra o quanto sua respiração está contribuindo para a ansiedade que você sente no dia a dia.
                </p>

                <div class="welcome-badges">
                    <div class="badge">
                        <span class="badge-icon">⏱</span>
                        <span>5 min</span>
                    </div>
                    <div class="badge">
                        <span class="badge-icon">☑</span>
                        <span>Gratuito</span>
                    </div>
                    <div class="badge">
                        <span class="badge-icon">🔬</span>
                        <span>Base Científica</span>
                    </div>
                </div>

                <button id="start-btn" class="btn-primary btn-glow" onclick="startQuiz()">
                    Iniciar Avaliação Gratuita
                    <span class="btn-arrow">&rarr;</span>
                </button>

                <p class="welcome-trust">Gratuito e confidencial. Mais de 2.000 pessoas já fizeram.</p>
            </div>
        </div>

        <!-- ==============================
             TELA 2: QUIZ
             ============================== -->
        <div id="quiz-screen" class="screen">
            <div class="quiz-top-bar">
                <div class="progress-track">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <div class="progress-info">
                    <span id="question-counter">1 de 11</span>
                    <span id="progress-text">0%</span>
                </div>
            </div>

            <div class="question-wrapper" id="question-container">
                <!-- Dynamic question content -->
            </div>
        </div>

        <!-- ==============================
             TELA 3: ANALYZING ANIMATION
             ============================== -->
        <div id="lead-screen" class="screen">
            <div class="lead-wrapper">
                <div class="analyzing-animation" id="analyzing-animation">
                    <div class="analyzing-brain">
                        <div class="brain-pulse"></div>
                        <div class="brain-pulse delay-1"></div>
                        <div class="brain-pulse delay-2"></div>
                        <span class="brain-emoji">🧠</span>
                    </div>
                    <h2 class="analyzing-title">Analisando suas respostas...</h2>
                    <div class="analyzing-steps" id="analyzing-steps"></div>
                </div>
            </div>
        </div>

        <!-- ==============================
             TELA 4: RESULTADO
             ============================== -->
        <div id="result-screen" class="screen">
            <div class="result-container" id="result-container">
                <!-- Dynamic results -->
            </div>
        </div>
    </div>

    <script src="quiz-data.js"></script>
    <script src="app.js"></script>
</body>
</html>
