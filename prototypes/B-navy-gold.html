<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protótipo B — Navy + Gold IBNR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --navy: #0A192F;
            --navy-light: #162845;
            --gold: #C6A868;
            --gold-hover: #B09255;
            --gold-glow: rgba(198, 168, 104, 0.3);
            --gold-dim: rgba(198, 168, 104, 0.15);
            --text-white: #F0EDE6;
            --text-dim: rgba(240, 237, 230, 0.5);
        }

        html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

        body {
            font-family: 'Lato', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--navy);
            color: var(--text-white);
            overflow: hidden;
            height: 100vh;
            height: 100dvh;
        }

        /* ---- Canvas ---- */
        #particles {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* ---- Vignette overlay ---- */
        .vignette {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(5, 10, 20, 0.6) 100%);
            z-index: 0;
            pointer-events: none;
        }

        /* ---- Hero ---- */
        .hero {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            height: 100dvh;
            padding: 24px 20px;
            text-align: center;
        }

        /* ---- Breathing Lung SVG ---- */
        .lung-container {
            position: relative;
            width: 130px;
            height: 130px;
            margin-bottom: 36px;
        }

        .lung-glow {
            position: absolute;
            inset: -30px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--gold-glow) 0%, transparent 70%);
            animation: pulseGlow 4s ease-in-out infinite;
        }

        .lung-svg {
            position: relative;
            z-index: 1;
            width: 130px;
            height: 130px;
            animation: breathe 4s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(0.90); opacity: 0.8; }
            50% { transform: scale(1.10); opacity: 1; }
        }

        @keyframes pulseGlow {
            0%, 100% { transform: scale(0.7); opacity: 0.2; }
            50% { transform: scale(1.3); opacity: 0.7; }
        }

        /* ---- Overline ---- */
        .overline {
            font-family: 'Lato', sans-serif;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 16px;
            opacity: 0;
            animation: fadeUp 0.8s 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* ---- Typography ---- */
        .title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(30px, 7vw, 52px);
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: -0.02em;
            margin-bottom: 20px;
            color: var(--text-white);
            opacity: 0;
            animation: fadeUp 0.8s 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .title-highlight {
            color: var(--gold);
        }

        .subtitle {
            font-family: 'Lato', sans-serif;
            font-size: clamp(15px, 3.5vw, 18px);
            font-weight: 300;
            line-height: 1.7;
            color: var(--text-dim);
            max-width: 440px;
            margin: 0 auto 36px;
            opacity: 0;
            animation: fadeUp 0.8s 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* ---- Badges ---- */
        .badges {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-bottom: 40px;
            opacity: 0;
            animation: fadeUp 0.8s 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 400;
            color: rgba(240, 237, 230, 0.7);
            background: rgba(198, 168, 104, 0.08);
            padding: 8px 14px;
            border-radius: 100px;
            border: 1px solid rgba(198, 168, 104, 0.15);
            backdrop-filter: blur(8px);
        }

        .badge-icon { font-size: 14px; }

        /* ---- CTA Button ---- */
        .cta {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 40px;
            font-size: 15px;
            font-weight: 700;
            font-family: 'Lato', sans-serif;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--navy);
            background: var(--gold);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 24px var(--gold-glow), 0 1px 3px rgba(0,0,0,0.3);
            opacity: 0;
            animation: fadeUp 0.8s 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .cta:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 40px rgba(198, 168, 104, 0.5), 0 2px 8px rgba(0,0,0,0.3);
            background: var(--gold-hover);
        }

        .cta:active { transform: translateY(0) scale(0.98); }

        .cta-arrow { transition: transform 0.3s ease; }
        .cta:hover .cta-arrow { transform: translateX(4px); }

        /* ---- Trust ---- */
        .trust {
            margin-top: 24px;
            font-size: 13px;
            font-weight: 300;
            color: var(--text-dim);
            opacity: 0;
            animation: fadeUp 0.8s 0.85s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* ---- Label ---- */
        .prototype-label {
            position: fixed;
            top: 16px;
            right: 16px;
            background: var(--gold);
            color: var(--navy);
            font-size: 11px;
            font-weight: 700;
            padding: 6px 12px;
            border-radius: 4px;
            z-index: 100;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (min-width: 768px) {
            .lung-container { width: 150px; height: 150px; }
            .lung-svg { width: 150px; height: 150px; }
        }
    </style>
</head>
<body>
    <div class="prototype-label">B — Navy + Gold IBNR</div>
    <canvas id="particles"></canvas>
    <div class="vignette"></div>

    <div class="hero">
        <div class="lung-container">
            <div class="lung-glow"></div>
            <svg class="lung-svg" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Left lung -->
                <path d="M38 35C38 35 28 42 24 55C20 68 22 82 30 88C36 92 42 90 44 84C46 78 48 65 48 55C48 45 44 38 38 35Z" fill="url(#lgL)" opacity="0.15" stroke="#C6A868" stroke-width="1" stroke-opacity="0.4"/>
                <!-- Right lung -->
                <path d="M82 35C82 35 92 42 96 55C100 68 98 82 90 88C84 92 78 90 76 84C74 78 72 65 72 55C72 45 76 38 82 35Z" fill="url(#lgR)" opacity="0.15" stroke="#C6A868" stroke-width="1" stroke-opacity="0.4"/>
                <!-- Trachea -->
                <path d="M60 18L60 40" stroke="#C6A868" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
                <!-- Bronchi -->
                <path d="M60 40C60 40 48 48 42 38" stroke="#C6A868" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
                <path d="M60 40C60 40 72 48 78 38" stroke="#C6A868" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
                <!-- Bronchioles left -->
                <path d="M42 38C42 38 34 50 30 60" stroke="#C6A868" stroke-width="1" stroke-linecap="round" opacity="0.25"/>
                <path d="M42 38C42 38 38 52 36 65" stroke="#C6A868" stroke-width="1" stroke-linecap="round" opacity="0.25"/>
                <!-- Bronchioles right -->
                <path d="M78 38C78 38 86 50 90 60" stroke="#C6A868" stroke-width="1" stroke-linecap="round" opacity="0.25"/>
                <path d="M78 38C78 38 82 52 84 65" stroke="#C6A868" stroke-width="1" stroke-linecap="round" opacity="0.25"/>
                <!-- Air flow dots -->
                <circle cx="60" cy="24" r="2" fill="#C6A868" opacity="0.7">
                    <animate attributeName="cy" values="18;32;18" dur="4s" repeatCount="indefinite"/>
                    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="4s" repeatCount="indefinite"/>
                </circle>
                <circle cx="56" cy="30" r="1.5" fill="#C6A868" opacity="0.4">
                    <animate attributeName="cy" values="30;50;30" dur="4s" begin="0.5s" repeatCount="indefinite"/>
                    <animate attributeName="cx" values="56;40;56" dur="4s" begin="0.5s" repeatCount="indefinite"/>
                    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="4s" begin="0.5s" repeatCount="indefinite"/>
                </circle>
                <circle cx="64" cy="30" r="1.5" fill="#C6A868" opacity="0.4">
                    <animate attributeName="cy" values="30;50;30" dur="4s" begin="0.5s" repeatCount="indefinite"/>
                    <animate attributeName="cx" values="64;80;64" dur="4s" begin="0.5s" repeatCount="indefinite"/>
                    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="4s" begin="0.5s" repeatCount="indefinite"/>
                </circle>
                <defs>
                    <linearGradient id="lgL" x1="24" y1="35" x2="48" y2="88">
                        <stop stop-color="#C6A868"/>
                        <stop offset="1" stop-color="#8B7340"/>
                    </linearGradient>
                    <linearGradient id="lgR" x1="96" y1="35" x2="72" y2="88">
                        <stop stop-color="#C6A868"/>
                        <stop offset="1" stop-color="#8B7340"/>
                    </linearGradient>
                </defs>
            </svg>
        </div>

        <div class="overline">iBreathwork</div>

        <h1 class="title">
            Teste de Ansiedade por<br>
            <span class="title-highlight">Disfunção Respiratória</span>
        </h1>

        <p class="subtitle">
            Descubra o quanto sua respiração está contribuindo para a ansiedade que você sente no dia a dia.
        </p>

        <div class="badges">
            <div class="badge"><span class="badge-icon">⏱</span> 5 min</div>
            <div class="badge"><span class="badge-icon">✓</span> Gratuito</div>
            <div class="badge"><span class="badge-icon">🔬</span> Científico</div>
        </div>

        <button class="cta">
            Iniciar Avaliação Gratuita
            <span class="cta-arrow">→</span>
        </button>

        <p class="trust">Gratuito e confidencial · Mais de 2.000 pessoas já fizeram</p>
    </div>

    <script>
        // ============================================
        // CANVAS PARTICLE SYSTEM — GOLDEN AIR FLOW
        // ============================================
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let w, h, particles = [], mouse = { x: -1000, y: -1000 };

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        document.addEventListener('mousemove', e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        class Particle {
            constructor() { this.reset(); }

            reset() {
                this.x = Math.random() * w;
                this.y = Math.random() * h;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.2;
                this.speedY = -Math.random() * 0.3 - 0.08;
                this.opacity = Math.random() * 0.4 + 0.05;
                this.life = Math.random() * 250 + 120;
                this.maxLife = this.life;
                // Gold color variation
                this.hue = 38 + Math.random() * 10; // 38-48 (gold range)
                this.sat = 50 + Math.random() * 20;
                this.light = 55 + Math.random() * 15;
            }

            update() {
                const dx = this.x - mouse.x;
                const dy = this.y - mouse.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 140) {
                    const force = (140 - dist) / 140;
                    this.speedX += (dx / dist) * force * 0.12;
                    this.speedY += (dy / dist) * force * 0.12;
                }

                this.x += this.speedX + Math.sin(Date.now() * 0.0008 + this.y * 0.008) * 0.12;
                this.y += this.speedY;

                this.speedX *= 0.99;
                this.speedY *= 0.99;

                this.life--;
                if (this.life <= 0 || this.y < -10 || this.x < -10 || this.x > w + 10) {
                    this.reset();
                    this.y = h + 10;
                }
            }

            draw() {
                const fadeRatio = this.life / this.maxLife;
                const alpha = this.opacity * (fadeRatio < 0.3 ? fadeRatio / 0.3 : fadeRatio > 0.7 ? (1 - fadeRatio) / 0.3 : 1);
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, ${this.sat}%, ${this.light}%, ${alpha})`;
                ctx.fill();
            }
        }

        const count = Math.min(Math.floor(w * h / 7000), 160);
        for (let i = 0; i < count; i++) particles.push(new Particle());

        function drawConnections() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 90) {
                        const alpha = (1 - dist / 90) * 0.05;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(198, 168, 104, ${alpha})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, w, h);
            particles.forEach(p => { p.update(); p.draw(); });
            drawConnections();
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
